version: "3.9"

services:

  db:
    image: postgres:16
    container_name: marketmurmur_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     mmuser
      POSTGRES_PASSWORD: mmpassword
      POSTGRES_DB:       marketmurmur
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d marketmurmur"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: marketmurmur_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mmuser:mmpassword@db:5432/marketmurmur
      NEWS_API_KEY: ${NEWS_API_KEY}
      ENVIRONMENT:  production
      DEBUG:        "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: marketmurmur_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL:             http://backend:8000
    ports:
      - "3000:3000"

  n8n:
    image: n8nio/n8n
    container_name: marketmurmur_n8n
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      N8N_HOST:     localhost
      N8N_PORT:     5678
      N8N_PROTOCOL: http
      WEBHOOK_URL:  http://localhost:5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows

volumes:
  postgres_data:
  n8n_data: